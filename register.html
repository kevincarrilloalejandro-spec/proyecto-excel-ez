<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta | Excel EZ</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-grid"></div>
    <div class="radial-gradient"></div>

    <main class="login-container">
        <header class="logo-section">
            <div class="logo">
                <i data-lucide="layout-grid" class="logo-icon"></i>
                <h1>Excel EZ</h1>
            </div>
            <p class="tagline">Crea tu cuenta para empezar.</p>
        </header>

        <section class="form-card">
            <form id="registerForm" novalidate>
                <div class="input-group">
                    <label for="fullName">Nombre completo</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="field-icon"></i>
                        <input type="text" id="fullName" placeholder="Tu nombre" required>
                    </div>
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="field-icon"></i>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="field-icon"></i>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i data-lucide="eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <div class="input-wrapper">
                        <i data-lucide="shield-check" class="field-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
                    </div>
                    <span class="error-message" id="confirmError"></span>
                </div>

                <button type="submit" class="btn-primary" id="registerBtn">
                    <span class="btn-text">Crear cuenta</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>

                <p class="register-hint">
                    ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
                </p>
            </form>
        </section>
    </main>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('registerForm');
            const nameInput = document.getElementById('fullName');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            
            const nameError = document.getElementById('nameError');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const confirmError = document.getElementById('confirmError');
            
            const registerBtn = document.getElementById('registerBtn');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnText = registerBtn.querySelector('.btn-text');

            lucide.createIcons();

            // Toggle password logic
            document.getElementById('togglePassword').addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                confirmInput.setAttribute('type', type);
                const icon = type === 'text' ? 'eye-off' : 'eye';
                document.getElementById('eyeIcon').setAttribute('data-lucide', icon);
                lucide.createIcons();
            });

            // Help functions
            const showError = (el, msg, input) => {
                el.textContent = msg;
                el.classList.add('visible');
                input.classList.add('invalid');
            };

            const hideError = (el, input) => {
                el.textContent = '';
                el.classList.remove('visible');
                input.classList.remove('invalid');
            };

            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;

                // Simple validation
                if (!nameInput.value.trim()) {
                    showError(nameError, 'Nombre es requerido', nameInput);
                    isValid = false;
                } else {
                    hideError(nameError, nameInput);
                }

                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
                    showError(emailError, 'Correo inválido', emailInput);
                    isValid = false;
                } else {
                    hideError(emailError, emailInput);
                }

                if (passwordInput.value.length < 6) {
                    showError(passwordError, 'Mínimo 6 caracteres', passwordInput);
                    isValid = false;
                } else {
                    hideError(passwordError, passwordInput);
                }

                if (confirmInput.value !== passwordInput.value) {
                    showError(confirmError, 'Las contraseñas no coinciden', confirmInput);
                    isValid = false;
                } else {
                    hideError(confirmError, confirmInput);
                }

                if (isValid) {
                    registerBtn.disabled = true;
                    btnText.style.opacity = '0';
                    btnSpinner.style.display = 'block';

                    setTimeout(() => {
                        const result = AUTH.register(nameInput.value, emailInput.value, passwordInput.value);
                        
                        if (result.success) {
                            alert('¡Cuenta creada correctamente! Serás redirigido al inicio de sesión.');
                            window.location.href = 'index.html?registered=true';
                        } else {
                            showError(emailError, result.message, emailInput);
                            registerBtn.disabled = false;
                            btnText.style.opacity = '1';
                            btnSpinner.style.display = 'none';
                        }
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>
